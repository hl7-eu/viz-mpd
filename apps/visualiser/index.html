<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MPD Viewer v0.1.0</title>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/liquidjs/dist/liquid.browser.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/styles.css">
  </head>
  <body>

    <div id="result" class="container"></div>
    <p id="preamble" class="text-muted small mt-2">MPD Viewer v0.1.0</p>

    <script type="text/javascript">
      var url = window.location.search.split('url=')[1];
      var resourceType = "Bundle";
      var templateFile = 'bundlempd.liquid';

      if (url) {
        if (url.indexOf('MedicationRequest') !== -1) {
          resourceType = "MedicationRequest";
          templateFile = 'medrequest.liquid';
        } else if (url.indexOf('MedicationDispense') !== -1) {
          resourceType = "MedicationDispense";
          templateFile = 'meddispense.liquid';
        } else if (url.indexOf('OperationOutcome') !== -1) {
          resourceType = "OperationOutcome";
          templateFile = 'outcome.liquid';
        }
      }

      var urlsplit = url ? url.split('/' + resourceType + '/') : [];
      if (urlsplit[1]) {
        var mpdid = urlsplit[1].split('?')[0];
        url = urlsplit[0] + '/' + resourceType + '/' + mpdid + '?_format=json';
      }

      var result = document.querySelector('#result');
      var engine = new liquidjs.Liquid();
      engine.registerFilter('pluralize', function(v) {
        if (typeof v === 'number' && v !== 1) return 's';
        return '';
      });

      $.get("./templates/" + templateFile, function(ltemplate) {
        $.getJSON(url, function(json) {
          console.log(url);
          console.log(json);
          if (resourceType === "MedicationRequest" || resourceType === "MedicationDispense") {
            var wrapper = { resource: json, entry: [{ fullUrl: url, resource: json }] };
            engine.parseAndRender(ltemplate, wrapper)
              .then(function(html) { result.innerHTML = html; });
          } else {
            engine.parseAndRender(ltemplate, json)
              .then(function(html) { result.innerHTML = html; });
          }
        });
      });
    </script>
  </body>
</html>
