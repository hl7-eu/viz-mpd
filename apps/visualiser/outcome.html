<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Validation Outcome</title>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/liquidjs/dist/liquid.browser.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./assets/css/styles.css">
  </head>

<body>
  <div id="result" class="container"></div>


  <script type="text/javascript">
    var url = new URLSearchParams(window.location.search).get('url');

    var result = document.querySelector('#result');

    function showError(msg, detail) {
      result.innerHTML = '<div class="alert alert-danger">' + msg + '</div>' +
        (detail ? '<pre class="small text-muted">' + detail + '</pre>' : '');
    }

    function processResponseData(responseData) {
      if (responseData && responseData.issue && Array.isArray(responseData.issue)) {
        for (var i = 0; i < responseData.issue.length; i++) {
          if (responseData.issue[i].severity === 'error') {
            console.log(responseData.issue[i].diagnostics);
          }
        }
      }
      return responseData;
    }

    function deriveBaseUrl(resourceUrl) {
      try {
        var parsed = new URL(resourceUrl);
        var path = parsed.pathname;
        var fhirIndex = path.indexOf('/fhir');
        if (fhirIndex > -1) {
          return parsed.origin + path.substring(0, fhirIndex + 5);
        }
        return parsed.origin + path.replace(/\/Bundle\/.+$/, '');
      } catch (e) {
        return null;
      }
    }

    var engine = new liquidjs.Liquid();
    engine.registerFilter('pluralize', function(v) {
      if (typeof v === 'number' && v !== 1) return 's';
      return '';
    });

    $.get("./templates/outcome.liquid", function(ltemplate) {
      if (!url) {
        showError('No URL parameter provided. Usage: outcome.html?url=&lt;resource_url&gt;');
        return;
      }

      var baseurl = deriveBaseUrl(url);
      if (!baseurl) {
        showError('Could not derive server URL from: ' + url);
        return;
      }

      var bundleId = '';
      try {
        var match = url.match(/\/Bundle\/([^?/]+)/);
        bundleId = match ? match[1] : '';
      } catch (e) {}

      var validateUrl = bundleId
        ? baseurl + '/Bundle/' + bundleId + '/$validate'
        : baseurl + '/Bundle/$validate';

      console.log("Validate URL: ", validateUrl);

      fetch(validateUrl, {
        headers: { 'Accept': 'application/fhir+json' }
      })
        .then(function(response) {
          if (response.ok || response.status === 412) {
            return response.json();
          }
          throw new Error('$validate failed: ' + response.status + ' ' + response.statusText);
        })
        .then(function(validationData) {
          var processedData = processResponseData(validationData);
          console.log(processedData);
          engine.parseAndRender(ltemplate, processedData)
            .then(function(html) { result.innerHTML = html; });
        })
        .catch(function(error) {
          console.error('Validation error:', error);
          showError('Validation failed', error.message);
        });
    }).fail(function(xhr, textStatus, errorThrown) {
      showError('Failed to load template', textStatus + ' ' + errorThrown);
    });
  </script>
</body>

</html>
