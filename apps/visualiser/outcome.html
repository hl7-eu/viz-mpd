<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Validation Outcome</title>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/liquidjs/dist/liquid.browser.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./assets/css/styles.css">
  </head>

<body>
  <div id="result" class="container"></div>


  <script type="text/javascript">
    var url = new URLSearchParams(window.location.search).get('url');

    var result = document.querySelector('#result');

    function processResponseData(responseData) {
      if (responseData && responseData.issue && Array.isArray(responseData.issue)) {
        for (var i = 0; i < responseData.issue.length; i++) {
          if (responseData.issue[i].severity === 'error') {
            console.log(responseData.issue[i].diagnostics);
          }
        }
      }
      return responseData;
    }

    var engine = new liquidjs.Liquid();
    engine.registerFilter('pluralize', function(v) {
      if (typeof v === 'number' && v !== 1) return 's';
      return '';
    });

    $.get("./templates/" + "outcome.liquid", function(ltemplate) {
      if (!url) {
        result.innerHTML = '<div class="alert alert-danger">No URL parameter provided.</div>';
        return;
      }
      console.log("Resource URL: ", url);

      $.getJSON("../config.json", function(config) {
        var baseurl = config.server_url;
        var postUrl = baseurl + '/Bundle/$validate';
        console.log("POST URL from config: ", postUrl);

        $.ajax({
          url: url,
          type: 'GET',
          dataType: 'json',
          success: function(getResponse) {
            console.log("GET Response: ", getResponse);
            $.ajax({
              url: postUrl,
              type: 'POST',
              contentType: 'application/fhir+json',
              data: JSON.stringify(getResponse),
              complete: function(xhr, textStatus) {
                if (xhr.status === 200 || xhr.status === 412) {
                  var processedData = processResponseData(xhr.responseJSON);
                  console.log(processedData);
                  engine.parseAndRender(ltemplate, processedData)
                    .then(function(html) { result.innerHTML = html; });
                } else {
                  console.log("Error in POST Request: Status Code ", xhr.status);
                  result.innerHTML = '<div class="alert alert-danger">Validation request failed with status ' + xhr.status + '</div>';
                }
              }
            });
          },
          error: function(xhr, textStatus, errorThrown) {
            console.error("Error fetching resource:", textStatus, errorThrown);
            result.innerHTML = '<div class="alert alert-danger">Failed to fetch resource from: ' + url + '<br>Error: ' + errorThrown + '</div>';
          }
        });
      }).fail(function(xhr, textStatus, errorThrown) {
        console.error("Error fetching config.json:", textStatus, errorThrown);
        result.innerHTML = '<div class="alert alert-danger">Failed to load config.json. Make sure the file exists.</div>';
      });
    });
  </script>
</body>

</html>
